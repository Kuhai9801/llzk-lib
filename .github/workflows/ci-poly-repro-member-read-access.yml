name: "Poly repro: member read access loss"

on:
  workflow_dispatch:
  push:
    branches:
      - ci/poly-repro-member-read-access

jobs:
  repro:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@d1ca217b388ee87b2507a9a93bf01368bde7cec2
        with:
          install_url: https://releases.nixos.org/nix/nix-2.23.3/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
          authToken: '${{ secrets.CACHIX_PUBLIC_TOKEN }}'
      - name: Build and run repro lit tests
        run: nix --print-build-logs build '.#debugGCC'
      - name: Capture downstream proof
        run: |
          set -euo pipefail
          mkdir -p proof
          input='test/Transforms/PolyLowering/poly_lowering_repro_member_read_access_loss.llzk'
          opt='result/bin/llzk-opt'

          "$opt" -I test/Transforms/PolyLowering -split-input-file \
            -llzk-poly-lowering-pass='max-degree=2' "$input" \
            > proof/poly-lowered.llzk

          awk '/function.def @compute/,/function.return/' proof/poly-lowered.llzk > proof/compute-region.llzk
          awk '/function.def @constrain/,/function.return/' proof/poly-lowered.llzk > proof/constrain-region.llzk

          grep -F '[@x]' proof/compute-region.llzk > proof/compute-x-read.txt
          if grep -F 'tableOffset' proof/compute-x-read.txt; then
            echo 'unexpected tableOffset preserved on compute aux producer' >&2
            exit 1
          fi
          grep -F '[@x]' proof/constrain-region.llzk | grep -F 'tableOffset = -1 : index' > proof/constrain-offset-read.txt
          grep -F '[@__llzk_poly_lowering_pass_aux_member_0]' proof/compute-region.llzk > proof/compute-aux-access.txt
          grep -F '[@__llzk_poly_lowering_pass_aux_member_0]' proof/constrain-region.llzk > proof/constrain-aux-access.txt

          "$opt" -I test/Transforms/PolyLowering -split-input-file \
            -llzk-poly-lowering-pass='max-degree=2' \
            --llzk-compute-constrain-to-product='root-struct=TableOffsetAux' \
            --llzk-to-smt-no-cf='field=babybear' "$input" \
            > proof/downstream-smt.mlir
          grep -F 'smt.assert' proof/downstream-smt.mlir > proof/downstream-smt-asserts.txt

          echo '=== compute reads current x while producing aux ==='
          cat proof/compute-x-read.txt
          echo '=== constrain reads prior-row x while consuming same aux ==='
          cat proof/constrain-offset-read.txt
          echo '=== downstream SMT assertions were emitted from the mismatched lowered artifact ==='
          head -n 20 proof/downstream-smt-asserts.txt
      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: poly-repro-member-read-access-proof
          path: proof/**
