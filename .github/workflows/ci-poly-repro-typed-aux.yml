name: "Poly repro: typed auxiliary member"

on:
  workflow_dispatch:
  push:
    branches:
      - ci/poly-repro-typed-aux

jobs:
  repro:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@d1ca217b388ee87b2507a9a93bf01368bde7cec2
        with:
          install_url: https://releases.nixos.org/nix/nix-2.23.3/install
          github_access_token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Set Git credentials
        run: |
          git config --global 'url.https://api@github.com/'.insteadOf 'https://github.com/'
          git config --global 'url.https://ssh@github.com/'.insteadOf 'ssh://git@github.com/'
          git config --global 'url.https://git@github.com/'.insteadOf 'git@github.com:'
      - uses: cachix/cachix-action@v17
        with:
          name: veridise-public
          authToken: '${{ secrets.CACHIX_PUBLIC_TOKEN }}'
      - name: Build and run repro lit tests
        run: nix --print-build-logs build '.#debugGCC'
      - name: Capture verifier rejection proof
        run: |
          set -euo pipefail
          mkdir -p proof
          input='test/Transforms/PolyLowering/poly_lowering_repro_typed_aux_member.llzk'
          opt='result/bin/llzk-opt'

          set +e
          "$opt" -I test/Transforms/PolyLowering -split-input-file \
            -llzk-poly-lowering-pass='max-degree=2' "$input" \
            > proof/stdout.llzk 2> proof/stderr.txt
          status="$?"
          set -e
          if [ "$status" -eq 0 ]; then
            echo 'expected verifier rejection, but poly lowering succeeded' >&2
            exit 1
          fi
          grep -F "'struct.readm' op has wrong type; expected '!felt.type', got '!felt.type<\"babybear\">'" proof/stderr.txt \
            > proof/verifier-error.txt

          echo '=== verifier rejects the typed lowered artifact ==='
          cat proof/verifier-error.txt
      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: poly-repro-typed-aux-proof
          path: proof/**
